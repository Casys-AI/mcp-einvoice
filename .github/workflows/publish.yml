name: Publish

on:
  push:
    branches:
      - main

jobs:
  publish-jsr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build UI viewers
        run: |
          cd packages/mcp/src/ui
          npm ci
          node build-all.mjs

      - name: Publish @casys/einvoice-core to JSR
        run: |
          cd packages/core
          set +e
          OUTPUT=$(deno publish --allow-dirty 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"
          if [ "$STATUS" -eq 0 ]; then exit 0; fi
          if echo "$OUTPUT" | grep -qi "already been published"; then
            echo "Version already published, skipping"
            exit 0
          fi
          exit "$STATUS"

      - name: Publish @casys/mcp-einvoice to JSR
        run: |
          cd packages/mcp
          set +e
          OUTPUT=$(deno publish --allow-dirty 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"
          if [ "$STATUS" -eq 0 ]; then exit 0; fi
          if echo "$OUTPUT" | grep -qi "already been published"; then
            echo "Version already published, skipping"
            exit 0
          fi
          exit "$STATUS"

      - name: Publish @casys/einvoice-rest to JSR
        run: |
          cd packages/rest
          set +e
          OUTPUT=$(deno publish --allow-dirty 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"
          if [ "$STATUS" -eq 0 ]; then exit 0; fi
          if echo "$OUTPUT" | grep -qi "already been published"; then
            echo "Version already published, skipping"
            exit 0
          fi
          exit "$STATUS"

  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build UI viewers
        run: |
          cd packages/mcp/src/ui
          npm ci
          node build-all.mjs

      - name: Build Node.js bundle
        run: bash scripts/build-node.sh

      - name: Publish to npm
        run: |
          cd dist-node/bin
          set +e
          PUBLISH_OUTPUT=$(npm publish --access public 2>&1)
          PUBLISH_STATUS=$?
          set -e

          echo "$PUBLISH_OUTPUT"

          if [ "$PUBLISH_STATUS" -eq 0 ]; then
            exit 0
          fi

          if echo "$PUBLISH_OUTPUT" | grep -qiE "cannot publish over the previously published versions|cannot publish over previously published version|you cannot publish over"; then
            echo "Version already published, skipping"
            exit 0
          fi

          exit "$PUBLISH_STATUS"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
