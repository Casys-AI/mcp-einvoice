    .toolbar select, .toolbar button { padding: 6px 12px; border-radius: 4px; border: 1px solid #444; background: #2d2d44; color: white; cursor: pointer; }
    .toolbar button:hover { background: #3d3d54; }
    .toolbar .label { font-size: 12px; opacity: 0.7; }
    iframe { width: 100%; border: none; background: white; }
    .logs { background: #1a1a2e; color: #8f8; font-family: monospace; font-size: 11px; padding: 8px; max-height: 150px; overflow-y: auto; }
    .logs div { padding: 2px 0; }

    <option value="status-history">Historique statuts</option>

  <button id="load">Charger</button>

function log(msg) {
  const el = document.getElementById("logs");
  const d = document.createElement("div");
  d.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
  el.prepend(d);
}

function loadViewer() {
  const scenarioKey = document.getElementById("scenario").value;
  const scenario = SCENARIOS[scenarioKey];
  const viewerSelect = document.getElementById("viewer");
  const viewerName = scenario.viewer || viewerSelect.value;
  viewerSelect.value = viewerName;

  const iframe = document.getElementById("app");
  iframe.src = "/" + viewerName + "/";
  log("Loading " + viewerName + " with scenario \"" + scenarioKey + "\"");

  function handleMessage(event) {
    if (event.source !== iframe.contentWindow) return;
    const msg = event.data;
    if (!msg || msg.jsonrpc !== "2.0") return;

    const method = msg.method || "(response)";
    log("App -> Host: " + method + (msg.id ? " (id:" + msg.id + ")" : ""));

    if (msg.method === "ui/initialize" && msg.id != null) {
      iframe.contentWindow.postMessage({
        jsonrpc: "2.0", id: msg.id,
        result: {
          protocolVersion: "2026-01-26",
          hostInfo: { name: "test-harness", version: "1.0.0" },
          hostCapabilities: { serverTools: { listChanged: false } },
          hostContext: { theme: "light", displayMode: "inline" }
        }
      }, "*");
      log("Host -> App: initialize response OK");

      setTimeout(function() {
        iframe.contentWindow.postMessage({
          jsonrpc: "2.0",
          method: "ui/notifications/tool-result",
          params: {
            content: [{ type: "text", text: JSON.stringify(scenario.data) }],
            isError: false
          }
        }, "*");
        log("Host -> App: tool-result sent");
      }, 300);
    }

    if (msg.method === "tools/call" && msg.id != null) {
      log("App -> Host: tools/call \"" + (msg.params && msg.params.name) + "\" args=" + JSON.stringify((msg.params && msg.params.arguments) || {}));
      var mockResponse = { success: true, message: "Mock action completed" };
      if (msg.params && msg.params.name === "einvoice_invoice_emit") {
        mockResponse = { type: "INVOICE", id: "019cfa99-mock-emit-uuid" };
      }
      setTimeout(function() {
        iframe.contentWindow.postMessage({
          jsonrpc: "2.0", id: msg.id,
          result: {
            content: [{ type: "text", text: JSON.stringify(mockResponse) }],
            isError: false
          }
        }, "*");
        log("Host -> App: tools/call response (success)");
      }, 500);
    }
  }

  window.removeEventListener("message", window._mcpHandler);
  window._mcpHandler = handleMessage;
  window.addEventListener("message", handleMessage);
}

document.getElementById("load").onclick = loadViewer;
document.getElementById("reload").onclick = function() {
  document.getElementById("app").contentWindow.location.reload();
  setTimeout(loadViewer, 500);
};
document.getElementById("scenario").onchange = loadViewer;

setTimeout(loadViewer, 500);
</script>

</html>
